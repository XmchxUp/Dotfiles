# Adapted from:
# https://github.com/theniceboy/.config/blob/master/.tmux.conf
# The original config depends on many repo-local helper scripts. This version
# keeps the navigation model and core behavior while remaining self-contained.

set -g default-shell /bin/zsh
set -gu default-command

setw -g xterm-keys on
set-window-option -g xterm-keys on
set -s escape-time 0
set -sg repeat-time 300
set -s focus-events on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on
set -g history-limit 10000

unbind C-b
set -g prefix C-s
bind C-s send-prefix

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g status-keys emacs
set -g mode-keys vi

set -g default-terminal "tmux-256color"
set -as terminal-features ",*256col*:RGB"
set -as terminal-overrides ",*256col*:Tc"

bind c new-window -c "#{pane_current_path}"
bind u split-window -v -b -c "#{pane_current_path}"
bind e split-window -v -c "#{pane_current_path}"
bind n split-window -h -b -c "#{pane_current_path}"
bind i split-window -h -c "#{pane_current_path}"
bind -n M-o new-window -c "#{pane_current_path}"
bind -n M-f resize-pane -Z

bind -n M-n select-pane -L
bind -n M-e select-pane -D
bind -n M-u select-pane -U
bind -n M-i select-pane -R

bind -n M-N resize-pane -L 3
bind -n M-E resize-pane -D 3
bind -n M-U resize-pane -U 3
bind -n M-I resize-pane -R 3

# MacBook-friendly fallbacks that do not rely on Option as Meta.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 3
bind J resize-pane -D 3
bind K resize-pane -U 3
bind L resize-pane -R 3

bind -r C-p previous-window
bind -r C-n next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

bind o new-window -c "#{pane_current_path}"
bind x kill-pane
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bind , command-prompt -I "#W" "rename-window '%%'"
bind . command-prompt -I "#S" "rename-session '%%'"

bind -n M-v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi n send-keys -X cursor-left
bind -T copy-mode-vi i send-keys -X cursor-right
bind -T copy-mode-vi u send-keys -X cursor-up
bind -T copy-mode-vi e send-keys -X cursor-down
bind -T copy-mode-vi N send-keys -X start-of-line
bind -T copy-mode-vi I send-keys -X end-of-line
bind -T copy-mode-vi U send-keys -N 5 -X cursor-up
bind -T copy-mode-vi E send-keys -N 5 -X cursor-down

set -g display-panes-time 2000
set -g display-time 2000

set -g status on
set -g status-interval 5
set -g status-bg black
set -g status-style fg=colour250,bg=black
set -g status-left-length 40
set -g status-right-length 80
set -g status-left '#[fg=colour223,bold] #S '
set -g status-right '#[fg=colour246]%Y-%m-%d %H:%M '
setw -g window-status-separator ''
setw -g window-status-format '#[fg=colour244] #I:#W '
setw -g window-status-current-format '#[fg=black,bg=colour148,bold] #I:#W '

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'vi vim nvim lazygit yazi'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
